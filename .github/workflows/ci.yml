name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Test (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: pip install -e ".[all]"

      - name: Run tests with coverage
        run: |
          pytest tests/ tests/integration/ \
            --cov=src --cov-report=xml --cov-report=term-missing \
            --tb=short -q
          # fail_under=80 is enforced via pyproject.toml [tool.coverage.report]

      - name: Upload coverage
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: coverage.xml

  build:
    name: Build wheel
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Build
        run: |
          pip install build
          python -m build

      - name: Verify install
        run: |
          pip install dist/*.whl
          dataiku-to-fabric --version

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    name: Publish to PyPI
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: build
    permissions:
      id-token: write          # trusted publisher (OIDC)
    environment:
      name: pypi
      url: https://pypi.org/p/dataiku-to-fabric
    steps:
      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist
          path: dist/

      - name: Publish via trusted publisher
        uses: pypa/gh-action-pypi-publish@release/v1
